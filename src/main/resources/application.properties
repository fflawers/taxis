# ================================================================
# application.properties — Configuración principal Spring Boot
# ================================================================

# ── Base de datos ────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taxis_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.data-source-properties.sslmode=require

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JSON: snake_case para compatibilidad con el frontend ─────
spring.jackson.property-naming-strategy=SNAKE_CASE

# ── Recursos estáticos (frontend compilado por Vite) ─────────
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

# ── Servidor ─────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Encriptación AES-256-CBC ─────────────────────────────────
app.crypto.key=${ENCRYPTION_KEY}

# ── Logging ──────────────────────────────────────────────────
logging.level.com.taxis=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
